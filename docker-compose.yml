services:
  api:
    build: ./Abeyonix_Backend/.
    container_name: abenyonix_backend
    restart: unless-stopped

    ports:
      - "8081:8000"

    env_file:
      - ./Abeyonix_Backend/.env

    volumes:
      - ./Abeyonix_Backend:/app

    command: >
      gunicorn app.main:app
      --workers 1
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120


  frontend:
    build: ./Abeyonix_Frontend/.
    container_name: abeyonix_frontend
    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      - api